_schema-version: 3.3.0
ID: earning-upload-v2
description: A simple CAP project.
version: 2.0.0
modules:
- name: earning-upload-v2-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: earning-upload-v2-db
  - name: earning-upload-v2-auth
  - name: earning-upload-v2-destination-service
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: earning-upload-v2-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: earning-upload-v2-db
    properties:
      TARGET_CONTAINER: ~{hdi-container-name}
  parameters:
    buildpack: nodejs_buildpack
- name: earning-upload-v2-destination-content
  type: com.sap.application.content
  requires:
  - name: earning-upload-v2-destination-service
    parameters:
      content-target: true
  - name: earning-upload-v2-repo-host
    parameters:
      service-key:
        name: earning-upload-v2-repo-host-key
  - name: earning-upload-v2-auth
    parameters:
      service-key:
        name: earning-upload-v2-auth-auth-key
  parameters:
    content:
      instance:
        destinations:
        - Name: earning-upload-v2-earning-upload-v2-repo-host
          ServiceInstanceName: earning-upload-v2-html5-service
          ServiceKeyName: earning-upload-v2-repo-host-key
          sap.cloud.service: earningupload
        - Authentication: OAuth2UserTokenExchange
          Name: earning-upload-v2-earning-upload-v2-auth
          ServiceInstanceName: earning-upload-v2-auth
          ServiceKeyName: earning-upload-v2-auth-key
          sap.cloud.service: earningupload
        - Name: MyCAPServiceDestination # Name of your destination
          Type: HTTP
          URL: ${env.MY_CAP_SERVICE_URL} # URL of the target CAP service
          ProxyType: Internet
          Authentication: OAuth2ClientCredentials
          ClientId: ~{mycapapp-xsuaa-service/clientid} # Retrieve clientid from XSUAA service key
          ClientSecret: ~{mycapapp-xsuaa-service/clientsecret} # Retrieve clientsecret from XSUAA service key
          TokenServiceURL: ~{mycapapp-xsuaa-service/url}/oauth/token # Token URL from XSUAA service key
          TokenServiceURLType: Dedicated
        existing_destinations_policy: update
  build-parameters:
    no-source: true
- name: earning-upload-v2-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: earning-upload-v2-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - comscbuploadearningsv2.zip
      name: comscbuploadearningsv2
      target-path: resources/
    - artifacts:
      - onboardbanksv2.zip
      name: onboardbanksv2
      target-path: resources/
    - artifacts:
      - peeranalysisv2.zip
      name: peeranalysisv2
      target-path: resources/
- name: comscbuploadearningsv2
  type: html5
  path: app/uploadearnings
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: onboardbanksv2
  type: html5
  path: app/onboardbanks
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
- name: peeranalysisv2
  type: html5
  path: app/peeranalysis
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: earning-upload-v2-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
  properties:
    hdi-container-name: ${service-name}
- name: earning-upload-v2-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      tenant-mode: dedicated
      xsappname: earning-upload-v2
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: earning-upload-v2-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: earning-upload-v2-html5-service
    service-plan: app-host
- name: earning-upload-v2-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: earning-upload-v2-srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: earning-upload-v2-destination-service
    service-plan: lite
  requires:
  - name: srv-api
- name: cross-container-service-1
  type: org.cloudfoundry.existing-service
  parameters:
    service-name: hdi_earningsai
  properties:
    the-service-name: ${service-name}
- name: cross-container-service-2
  type: org.cloudfoundry.existing-service
  parameters:
    service-name: earning-upload-v2-db
  properties:
    the-service-name: ${service-name}
- name: cross-container-service-3
  type: org.cloudfoundry.existing-service
  parameters:
    service-name: earning-upload-v2-db
  properties:
    the-service-name: ${service-name}
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
